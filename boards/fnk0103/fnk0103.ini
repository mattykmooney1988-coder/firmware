;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

##################################### FNK0103 MODELS ################################################
; Freenove FNK0103 - ESP32-S3, 3.2" ST7789 320x240, XPT2046 resistive touch
; TFT SPI: MOSI=11, MISO=13, SCLK=12, CS=10, DC=9, RST=46, BL=45
; Touch (XPT2046, shared SPI): CS=14, IRQ=N/C
; SD Card: CS=42, shared SPI bus (MOSI=11, MISO=13, SCLK=12)

[fnk0103_base]
board = fnk0103
monitor_speed = 115200
board_build.partitions = custom_4Mb_full.csv
build_src_filter = ${env.build_src_filter} +<../boards/fnk0103>
build_flags =
	${env.build_flags}
	${env_4mb.build_flags}
	-Iboards/fnk0103

	-DARDUINO_USB_CDC_ON_BOOT=1

	-DFNK0103=1  ;key for this device

	;Features Enabled
	;FM Radio - not present
	;-DFM_SI4713=1
	-DFM_RSTPIN=-1

	;Microphone - not present
	-DPIN_CLK=-1
	-DI2S_SCLK_PIN=-1
	-DI2S_DATA_PIN=-1
	-DPIN_DATA=-1

	;RGB LED - not present
	-DRGB_LED=-1

	;Speaker - not present
	-DBCLK=-1
	-DWCLK=-1
	-DDOUT=-1

	;BadUSB on serial pins
	-DBAD_TX=SERIAL_TX
	-DBAD_RX=SERIAL_RX

	;Serial / GPS
	-DSERIAL_TX=43
	-DSERIAL_RX=44
	-DGPS_SERIAL_TX=SERIAL_TX
	-DGPS_SERIAL_RX=SERIAL_RX

	;No physical buttons - touch only
	-DHAS_BTN=0
	-DBTN_ALIAS='"Ok"'
	-DBTN_PIN=0

	;Infrared / RF pins
	-DIR_TX_PINS='{{"Pin 2", 2}}'
	-DIR_RX_PINS='{{"Pin 2", 2}}'
	-DTXLED=2
	-DLED_ON=HIGH
	-DLED_OFF=LOW

	;RF module pins
	-DRF_TX_PINS='{{"Pin 2", 2}}'
	-DRF_RX_PINS='{{"Pin 2", 2}}'

	;CC1101 on main SPI bus
	-DUSE_CC1101_VIA_SPI
	-DCC1101_GDO0_PIN=2
	-DCC1101_SS_PIN=15
	-DCC1101_MOSI_PIN=SPI_MOSI_PIN
	-DCC1101_SCK_PIN=SPI_SCK_PIN
	-DCC1101_MISO_PIN=SPI_MISO_PIN

	;NRF24 on main SPI bus
	-DUSE_NRF24_VIA_SPI
	-DNRF24_CE_PIN=2
	-DNRF24_SS_PIN=15
	-DNRF24_MOSI_PIN=SPI_MOSI_PIN
	-DNRF24_SCK_PIN=SPI_SCK_PIN
	-DNRF24_MISO_PIN=SPI_MISO_PIN

	;W5500 on main SPI bus
	-DUSE_W5500_VIA_SPI
	-DW5500_SS_PIN=15
	-DW5500_MOSI_PIN=SPI_MOSI_PIN
	-DW5500_SCK_PIN=SPI_SCK_PIN
	-DW5500_MISO_PIN=SPI_MISO_PIN
	-DW5500_INT_PIN=2

	;Font sizes
	-DFP=1
	-DFM=2
	-DFG=3

	;Screen Setup - ST7789 3.2" 320x240
	-DHAS_SCREEN=1
	-DROTATION=3
	-DBACKLIGHT=45
	-DMINBRIGHT=1

	;TFT_eSPI setup
	-DUSER_SETUP_LOADED=1
	-DST7789_DRIVER=1
	-DTFT_WIDTH=320
	-DTFT_HEIGHT=240
	-DTFT_MISO=13
	-DTFT_MOSI=11
	-DTFT_SCLK=12
	-DTFT_CS=10
	-DTFT_DC=9
	-DTFT_RST=46
	-DTFT_BL=45
	-DTFT_BACKLIGHT_ON=HIGH
	-DSMOOTH_FONT=1
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=20000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-DTFT_INVERTION=0

	;Resistive touch (XPT2046, shared SPI bus)
	-DHAS_TOUCH=1
	-DHAS_RESISTIVE_TOUCH=1
	-DTOUCH_XPT2046_SPI
	-DXPT2046_TOUCH_CONFIG_INT_GPIO_NUM=-1
	-DXPT2046_SPI_BUS_MISO_IO_NUM=13
	-DXPT2046_SPI_BUS_MOSI_IO_NUM=11
	-DXPT2046_SPI_BUS_SCLK_IO_NUM=12
	-DXPT2046_SPI_CONFIG_CS_GPIO_NUM=14
	-DCYD28_TouchR_ROT=6
	-DCYD28_TouchR_CAL_XMIN=200
	-DCYD28_TouchR_CAL_XMAX=3700
	-DCYD28_TouchR_CAL_YMIN=200
	-DCYD28_TouchR_CAL_YMAX=3750

	;SD Card
	-DSDCARD_CS=42
	-DSDCARD_SCK=12
	-DSDCARD_MISO=13
	-DSDCARD_MOSI=11

	;TFT brightness PWM
	-DTFT_BRIGHT_CHANNEL=0
	-DTFT_BRIGHT_Bits=8
	-DTFT_BRIGHT_FREQ=5000

	;I2C / Grove
	-DGROVE_SDA=4
	-DGROVE_SCL=5

	;Main SPI bus
	-DSPI_SCK_PIN=12
	-DSPI_MOSI_PIN=11
	-DSPI_MISO_PIN=13
	-DSPI_SS_PIN=15

lib_deps =
	${env.lib_deps}

lib_ignore =
	${env_4mb.lib_ignore}


[env:FNK0103]
extends = fnk0103_base
build_flags =
	${fnk0103_base.build_flags}
	-DDEVICE_NAME='"FNK0103"'

[env:LAUNCHER_FNK0103]
extends = env:FNK0103
board_build.partitions = custom_4Mb.csv
build_flags =
	${env:FNK0103.build_flags}
	${env_light.build_flags}
lib_deps =
	${env_light.lib_deps}

################################# END OF FNK0103 MODELS ############################################
