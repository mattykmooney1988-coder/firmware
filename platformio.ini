[env:CYD-3248S035R]
extends=CYD35_base
build_flags =
	${CYD35_base.build_flags}
	-DST7796_DRIVER=1
	-DTFT_BL=27
	-DTOUCH_OFFSET_ROTATION=1
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-DTOUCH_CS=33
	-DUSE_TFT_eSPI_TOUCH
	-DTOUCH_CONFIG_INT_GPIO_NUM=36
	-DDEVICE_NAME='"CYD-3248S035R"'
    ; Resolution and Display Fixes
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DROTATION=1
    -DTFT_INVERSION_ON
